<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nettoyage OneSignal AVP</title>
<style>
body { font-family: sans-serif; padding: 20px; background: #f1f3f8; }
h1 { color: #2c3e91; font-size: 22px; }
button { background: #2c3e91; color: white; border: none; padding: 16px 24px; border-radius: 12px; font-size: 18px; cursor: pointer; width: 100%; margin-top: 16px; }
button.danger { background: #d63447; }
#log { margin-top: 20px; background: white; border-radius: 12px; padding: 16px; font-size: 14px; line-height: 1.8; min-height: 100px; white-space: pre-wrap; }
</style>
</head>
<body>
<h1>🧹 Nettoyage abonnés OneSignal</h1>
<p>Cet outil supprime les abonnés <strong>sans tag "prenom"</strong> dans OneSignal.</p>
<button onclick="analyser()">1️⃣ Analyser les abonnés</button>
<button class="danger" id="btn-supprimer" onclick="supprimer()" style="display:none">2️⃣ Supprimer les abonnés sans tag</button>
<div id="log">En attente...</div>

<script>
const APP_ID = "a89f967a-eddf-4a83-b654-4e34f0b95141";
const API_KEY = "os_v2_app_vcpzm6xn35fihnsujy2pbokrie4yatvhspnerj526vefq3w6ximldwxhv43wc56d27vawyzszrwck7bidsvz26ax3thvdmt7oiq4xwy";
let aSupprimer = [];

function log(msg) {
  document.getElementById('log').textContent += msg + '\n';
}

async function analyser() {
  document.getElementById('log').textContent = '';
  aSupprimer = [];
  log('🔍 Récupération des abonnés...');
  
  try {
    const resp = await fetch(`https://onesignal.com/api/v1/players?app_id=${APP_ID}&limit=300`, {
      headers: { Authorization: 'Basic ' + API_KEY }
    });
    const data = await resp.json();
    
    if (!data.players) { log('❌ Erreur : ' + JSON.stringify(data)); return; }
    
    log(`✅ Total abonnés : ${data.players.length}`);
    
    let avecTag = 0, sansTag = 0;
    
    data.players.forEach(p => {
      const prenom = p.tags && p.tags.prenom;
      if (prenom) {
        avecTag++;
        log(`✅ ${prenom} — ${p.id.slice(0,8)}...`);
      } else {
        sansTag++;
        aSupprimer.push(p.id);
        log(`❌ Sans tag — ${p.id.slice(0,8)}...`);
      }
    });
    
    log(`\n📊 Avec tag prenom : ${avecTag}`);
    log(`🗑️ Sans tag (à supprimer) : ${sansTag}`);
    
    if (aSupprimer.length > 0) {
      document.getElementById('btn-supprimer').style.display = 'block';
    }
  } catch(e) {
    log('❌ Erreur : ' + e.message);
  }
}

async function supprimer() {
  log('\n🗑️ Suppression en cours...');
  let ok = 0, err = 0;
  
  for (const id of aSupprimer) {
    try {
      const resp = await fetch(`https://onesignal.com/api/v1/players/${id}?app_id=${APP_ID}`, {
        method: 'DELETE',
        headers: { Authorization: 'Basic ' + API_KEY }
      });
      const data = await resp.json();
      if (data.success) { ok++; log(`✅ Supprimé : ${id.slice(0,8)}...`); }
      else { err++; log(`❌ Erreur : ${id.slice(0,8)}...`); }
    } catch(e) {
      err++;
    }
    await new Promise(r => setTimeout(r, 200));
  }
  
  log(`\n🎉 Terminé ! Supprimés : ${ok} | Erreurs : ${err}`);
  document.getElementById('btn-supprimer').style.display = 'none';
}
</script>
</body>
</html>
